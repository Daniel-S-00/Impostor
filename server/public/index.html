<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Impostor Online</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #020617;
            --surface-2: #1e293b;
            --border: #334155;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --primary: #ef4444;
            --primary-hover: #dc2626;
            --secondary: #2563eb;
            --secondary-hover: #1d4ed8;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }

        .card {
            background: var(--surface);
            padding: 24px;
            border-radius: 12px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        h2, h3, h4 { margin-top: 0; }

        .muted { color: var(--muted); font-size: 0.9rem; }

        input, select, button {
            width: 100%;
            padding: 10px 12px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
        }

        input:focus, select:focus { outline: 2px solid var(--secondary); }

        button {
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.15s ease;
        }
        button:hover:not(:disabled) { background: var(--primary-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        button.secondary { background: var(--secondary); }
        button.secondary:hover:not(:disabled) { background: var(--secondary-hover); }

        button.ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }
        button.ghost:hover:not(:disabled) { background: var(--surface-2); }

        .section {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }
        .section h4 {
            margin: 0 0 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li.player {
            background: var(--surface-2);
            margin-top: 6px;
            padding: 10px 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        li.player .name { font-weight: 500; }
        li.player .left {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .badge {
            background: var(--warning);
            color: #1f2937;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 999px;
            text-transform: uppercase;
        }
        .badge.voted {
            background: var(--success);
            color: #052e16;
        }
        .badge.you {
            background: var(--secondary);
            color: white;
        }

        .vote-btn {
            width: auto;
            padding: 6px 12px;
            margin: 0;
            font-size: 0.85rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .vote-btn:hover { background: var(--surface-2); }
        .vote-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        .vote-btn:disabled { display: none; }

        .hidden { display: none !important; }

        .role {
            text-align: center;
            margin: 12px 0 16px;
        }
        .role .label {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }
        .role.impostor .label { color: var(--primary); }
        .role.crewmate .label { color: var(--success); }
        .role .word {
            font-size: 1.3rem;
            margin: 6px 0 0;
            color: var(--text);
        }

        .host-controls {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .host-controls label {
            display: block;
            font-size: 0.9rem;
            color: var(--muted);
            margin-top: 8px;
        }

        .progress {
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        li.room {
            background: var(--surface-2);
            margin-top: 6px;
            padding: 10px 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        li.room .room-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }
        li.room .host {
            font-weight: 600;
        }
        li.room .code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            letter-spacing: 0.12em;
            font-weight: 600;
            color: var(--text);
        }
        li.room .meta {
            color: var(--muted);
            font-size: 0.8rem;
        }
        li.room .join-btn {
            width: auto;
            padding: 6px 14px;
            margin: 0;
            font-size: 0.85rem;
        }

        .leave-btn {
            width: auto;
            padding: 6px 14px;
            margin: 16px auto 0;
            display: block;
            font-size: 0.85rem;
        }
        .leave-btn:hover:not(:disabled) {
            color: var(--primary);
            border-color: var(--primary);
            background: transparent;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
            animation: fadeIn 0.15s ease;
        }
        .modal {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: scaleIn 0.15s ease;
        }
        .modal h3 { margin: 0 0 12px; }
        .modal-body {
            color: var(--text);
            white-space: pre-line;
            line-height: 1.5;
            margin: 0 0 20px;
        }
        .modal button { margin: 0; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.96); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card hidden" id="login">
        <h2>Impostor Online</h2>
        <p class="muted">Descubre al impostor antes de que sea demasiado tarde.</p>
        <input id="nickname" placeholder="Tu nickname" maxlength="20" autocomplete="off" />
        <button id="createBtn">Crear sala</button>

        <div class="section">
            <h4>Salas disponibles</h4>
            <ul id="roomList"></ul>
            <p class="muted hidden" id="noRoomsMsg">No hay salas abiertas. Crea una.</p>
            <button id="quickJoinBtn" class="secondary" disabled>Unirse al azar</button>
        </div>

        <div class="section">
            <h4>¿Tienes un código?</h4>
            <input id="roomCode" placeholder="Código de sala" maxlength="4" autocomplete="off" style="text-transform: uppercase;" />
            <button id="joinBtn" class="secondary">Unirse con código</button>
        </div>
    </div>

    <div class="card hidden" id="lobby">
        <h3>Sala <span id="lobbyCode"></span></h3>
        <p class="muted" id="roundInfo">Sala de espera</p>

        <div class="section">
            <h4>Jugadores</h4>
            <ul id="lobbyPlayerList"></ul>
        </div>

        <div class="host-controls hidden" id="hostControls">
            <label for="impostorCount">Cantidad de impostores</label>
            <select id="impostorCount">
                <option value="1">1 impostor</option>
                <option value="2">2 impostores</option>
                <option value="3">3 impostores</option>
            </select>
            <button id="startBtn" class="secondary" disabled>Iniciar partida</button>
        </div>
        <p class="muted" id="lobbyStatus"></p>
        <button id="leaveLobbyBtn" class="ghost leave-btn">Salir de la sala</button>
    </div>

    <div class="card hidden" id="gameView">
        <h3>Tu carta</h3>
        <div class="role" id="role"></div>
        <button id="toggleCardBtn" class="ghost">Ocultar carta</button>

        <div class="section">
            <h4>Jugadores <span class="muted" id="voteProgress"></span></h4>
            <ul id="gamePlayerList"></ul>
            <p class="progress" id="waitingMessage"></p>
        </div>
        <button id="leaveGameBtn" class="ghost leave-btn">Salir de la partida</button>
    </div>

    <div id="modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalBody">
        <div class="modal">
            <h3 id="modalTitle"></h3>
            <p id="modalBody" class="modal-body"></p>
            <button id="modalOk" class="secondary">Aceptar</button>
        </div>
    </div>

    <script>
        const socket = io({ transports: ["websocket"] });
        const state = {
            myId: null,
            currentRoom: null,
            room: null,
            card: null,
            cardHidden: false,
            roomList: []
        };

        const views = ["login", "lobby", "gameView"];

        function showView(name) {
            for (const v of views) {
                document.getElementById(v).classList.toggle("hidden", v !== name);
            }
        }

        function isHost() {
            return state.room && state.myId && state.room.host === state.myId;
        }

        function myVoteTarget() {
            if (!state.room) return null;
            const voters = state.room.voters || [];
            if (!voters.includes(state.myId)) return null;
            return state.room.players ? null : null;
        }

        function getMyVote() {
            // The server doesn't expose who you voted for in public state.
            // We track it client-side for instant feedback, but the canonical
            // record lives on the server. On room updates we re-derive from
            // the previous client state (which is good enough for UX).
            return state._lastVoteFor || null;
        }

        function setMyVote(targetId) {
            state._lastVoteFor = targetId;
        }

        function resetToLogin() {
            state.currentRoom = null;
            state.room = null;
            state.card = null;
            state.cardHidden = false;
            state._lastVoteFor = null;
            document.getElementById("roomCode").value = "";
            showView("login");
        }

        function readNickname() {
            const n = document.getElementById("nickname").value.trim();
            if (!n) { showModal({ title: "Falta el nickname", body: "Escribe un nickname para continuar." }); return null; }
            if (n.length > 20) { showModal({ title: "Nickname demasiado largo", body: "El nickname debe tener máximo 20 caracteres." }); return null; }
            return n;
        }

        function readRoomCode() {
            const c = document.getElementById("roomCode").value.trim().toUpperCase();
            if (!/^[A-Z0-9]{4}$/.test(c)) { showModal({ title: "Código inválido", body: "El código de sala debe tener 4 caracteres alfanuméricos." }); return null; }
            return c;
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        let modalKeyHandler = null;

        function closeModal() {
            const modal = document.getElementById("modal");
            modal.classList.add("hidden");
            document.getElementById("modalOk").onclick = null;
            if (modalKeyHandler) {
                document.removeEventListener("keydown", modalKeyHandler);
                modalKeyHandler = null;
            }
        }

        function showModal({ title, body, buttonText = "Aceptar", onClose = null } = {}) {
            const modal = document.getElementById("modal");
            const titleEl = document.getElementById("modalTitle");
            const bodyEl = document.getElementById("modalBody");
            const okBtn = document.getElementById("modalOk");

            titleEl.textContent = title || "";
            bodyEl.textContent = "";
            if (body) {
                const lines = String(body).split("\n");
                lines.forEach((line, i) => {
                    if (i > 0) bodyEl.appendChild(document.createElement("br"));
                    bodyEl.appendChild(document.createTextNode(line));
                });
            }
            okBtn.textContent = buttonText;

            const close = () => {
                closeModal();
                if (typeof onClose === "function") onClose();
            };

            const onKey = (e) => {
                if (e.key === "Enter" || e.key === "Escape") {
                    e.preventDefault();
                    close();
                }
            };

            modalKeyHandler = onKey;
            okBtn.onclick = close;
            document.addEventListener("keydown", onKey);

            modal.classList.remove("hidden");
            okBtn.focus();
        }

        function buildPlayerRow({ id, player, phase, showVoteButton }) {
            const li = document.createElement("li");
            li.className = "player";

            const left = document.createElement("div");
            left.className = "left";

            const name = document.createElement("span");
            name.className = "name";
            name.textContent = player.nickname;
            left.appendChild(name);

            const isMe = id === state.myId;
            const mePlayer = state.room.players[state.myId];
            const meExpelled = Boolean(mePlayer && mePlayer.expelled);

            if (isMe) {
                const meBadge = document.createElement("span");
                meBadge.className = "badge you";
                meBadge.textContent = "Tú";
                left.appendChild(meBadge);
            } else if (id === state.room.host) {
                const hostBadge = document.createElement("span");
                hostBadge.className = "badge";
                hostBadge.textContent = "Anfitrión";
                left.appendChild(hostBadge);
            }

            if (player.expelled) {
                const expelledBadge = document.createElement("span");
                expelledBadge.className = "badge";
                expelledBadge.style.background = "var(--primary)";
                expelledBadge.style.color = "white";
                expelledBadge.textContent = "Expulsado";
                left.appendChild(expelledBadge);
            }

            li.appendChild(left);

            const canVote = showVoteButton && !isMe && !player.expelled && !meExpelled;
            if (canVote) {
                const votedAlready = (state.room.voters || []).includes(id);
                if (phase === "game" && votedAlready) {
                    const votedBadge = document.createElement("span");
                    votedBadge.className = "badge voted";
                    votedBadge.textContent = "Votó";
                    li.appendChild(votedBadge);
                }

                const myCurrent = getMyVote();
                const btn = document.createElement("button");
                btn.className = "vote-btn" + (myCurrent === id ? " active" : "");
                btn.textContent = myCurrent === id ? "Tu voto" : "Votar";
                btn.onclick = () => {
                    socket.emit("vote", { code: state.currentRoom, targetId: id });
                    setMyVote(id);
                    renderView();
                };
                li.appendChild(btn);
            }

            return li;
        }

        function renderLobby() {
            document.getElementById("lobbyCode").textContent = state.currentRoom;
            document.getElementById("roundInfo").textContent =
                state.room.currentRound > 0
                    ? `Ronda ${state.room.currentRound} · Listos para la siguiente`
                    : "Sala de espera";

            const ul = document.getElementById("lobbyPlayerList");
            ul.innerHTML = "";
            for (const [id, p] of Object.entries(state.room.players)) {
                ul.appendChild(buildPlayerRow({ id, player: p, phase: "lobby", showVoteButton: false }));
            }

            const hostControls = document.getElementById("hostControls");
            const status = document.getElementById("lobbyStatus");
            const startBtn = document.getElementById("startBtn");
            const playerCount = Object.keys(state.room.players).length;

            if (isHost()) {
                hostControls.classList.remove("hidden");
                document.getElementById("impostorCount").value = String(state.room.impostorCount);
                const maxImpostors = Math.min(3, Math.max(1, playerCount - 1));
                for (const opt of document.getElementById("impostorCount").options) {
                    opt.disabled = Number(opt.value) > maxImpostors;
                }
                startBtn.disabled = playerCount < 2;
                status.textContent = playerCount < 2
                    ? "Esperando al menos 2 jugadores…"
                    : "Cuando estén todos, inicia la partida.";
            } else {
                hostControls.classList.add("hidden");
                status.textContent = "Esperando a que el anfitrión inicie la partida…";
            }
        }

        function renderCard() {
            const div = document.getElementById("role");
            const toggleBtn = document.getElementById("toggleCardBtn");

            const mePlayer = state.room && state.room.players[state.myId];
            const meExpelled = Boolean(mePlayer && mePlayer.expelled);

            if (meExpelled) {
                div.innerHTML = '<div class="muted">Has sido expulsado.<br>Espera la siguiente ronda.</div>';
                toggleBtn.classList.add("hidden");
                return;
            }

            if (!state.card) {
                div.innerHTML = '<div class="muted">Esperando…</div>';
                toggleBtn.classList.add("hidden");
                return;
            }

            toggleBtn.classList.remove("hidden");

            if (state.cardHidden) {
                div.innerHTML = '<div class="muted">Carta oculta</div>';
                toggleBtn.textContent = "Mostrar carta";
                return;
            }

            div.className = "role " + (state.card.role === "impostor" ? "impostor" : "crewmate");
            if (state.card.role === "impostor") {
                div.innerHTML =
                    '<div class="label">IMPOSTOR</div>' +
                    `<p>Categoría: <b>${escapeHtml(state.card.category)}</b></p>` +
                    '<p class="muted">No conoces la palabra secreta. Engaña a los demás.</p>';
            } else {
                div.innerHTML =
                    '<div class="label">TRIPULANTE</div>' +
                    `<p>Categoría: <b>${escapeHtml(state.card.category)}</b></p>` +
                    `<p class="word">Palabra: <b>${escapeHtml(state.card.word)}</b></p>`;
            }
            toggleBtn.textContent = "Ocultar carta";
        }

        function renderGame() {
            renderCard();

            const ul = document.getElementById("gamePlayerList");
            ul.innerHTML = "";
            for (const [id, p] of Object.entries(state.room.players)) {
                ul.appendChild(buildPlayerRow({ id, player: p, phase: "game", showVoteButton: true }));
            }

            const totalPlayers = Object.values(state.room.players);
            const activeTotal = totalPlayers.filter((p) => !p.expelled).length;
            const votedCount = (state.room.voters || []).length;
            document.getElementById("voteProgress").textContent = `(${votedCount} / ${activeTotal})`;

            const waiting = document.getElementById("waitingMessage");
            const me = state.room.players[state.myId];
            const meExpelled = Boolean(me && me.expelled);
            const myVoted = (state.room.voters || []).includes(state.myId);

            if (meExpelled) {
                waiting.textContent = "Estás observando la partida como espectador.";
            } else if (votedCount < activeTotal) {
                waiting.textContent = myVoted
                    ? "Voto enviado. Esperando a los demás…"
                    : "Elige a quién expulsar. Puedes cambiar tu voto en cualquier momento.";
            } else {
                waiting.textContent = "Todos han votado. Calculando…";
            }
        }

        function renderRoomList() {
            const ul = document.getElementById("roomList");
            const noRoomsMsg = document.getElementById("noRoomsMsg");
            const quickJoinBtn = document.getElementById("quickJoinBtn");
            const list = state.roomList || [];

            ul.innerHTML = "";
            if (list.length === 0) {
                noRoomsMsg.classList.remove("hidden");
                quickJoinBtn.disabled = true;
                return;
            }

            noRoomsMsg.classList.add("hidden");
            quickJoinBtn.disabled = false;

            for (const room of list) {
                const li = document.createElement("li");
                li.className = "room";

                const info = document.createElement("div");
                info.className = "room-info";
                const host = document.createElement("span");
                host.className = "host";
                host.textContent = room.hostNickname;
                const code = document.createElement("span");
                code.className = "code";
                code.textContent = room.code;
                const meta = document.createElement("span");
                meta.className = "meta";
                const playersLabel = room.playerCount === 1 ? "1 jugador" : `${room.playerCount} jugadores`;
                const impostorsLabel = room.impostorCount === 1 ? "1 impostor" : `${room.impostorCount} impostores`;
                meta.textContent = `${playersLabel} · ${impostorsLabel}`;
                info.appendChild(host);
                info.appendChild(code);
                info.appendChild(meta);
                li.appendChild(info);

                const btn = document.createElement("button");
                btn.className = "vote-btn join-btn";
                btn.textContent = "Unirse";
                btn.onclick = () => {
                    const nickname = readNickname();
                    if (nickname) socket.emit("joinRoom", { nickname, code: room.code });
                };
                li.appendChild(btn);

                ul.appendChild(li);
            }
        }

        function renderView() {
            if (!state.currentRoom) {
                showView("login");
                renderRoomList();
                return;
            }
            const phase = state.room && state.room.phase;
            if (phase === "lobby") {
                showView("lobby");
                renderLobby();
            } else if (phase === "game") {
                showView("gameView");
                renderGame();
            } else {
                showView("lobby");
            }
        }

        document.getElementById("createBtn").onclick = () => {
            const nickname = readNickname();
            if (nickname) socket.emit("createRoom", { nickname });
        };

        document.getElementById("quickJoinBtn").onclick = () => {
            const nickname = readNickname();
            if (!nickname) return;
            const list = state.roomList || [];
            if (list.length === 0) {
                showModal({ title: "Sin salas", body: "No hay salas disponibles. Crea una." });
                return;
            }
            const randomRoom = list[Math.floor(Math.random() * list.length)];
            socket.emit("joinRoom", { nickname, code: randomRoom.code });
        };

        document.getElementById("joinBtn").onclick = () => {
            const nickname = readNickname();
            const code = readRoomCode();
            if (nickname && code) socket.emit("joinRoom", { nickname, code });
        };

        function leaveCurrentRoom() {
            if (!state.currentRoom) return;
            const code = state.currentRoom;
            socket.emit("leaveRoom", { code });
            resetToLogin();
        }

        document.getElementById("leaveLobbyBtn").onclick = leaveCurrentRoom;
        document.getElementById("leaveGameBtn").onclick = leaveCurrentRoom;

        document.getElementById("impostorCount").onchange = (e) => {
            if (!state.currentRoom) return;
            socket.emit("setImpostorCount", {
                code: state.currentRoom,
                count: Number(e.target.value)
            });
        };

        document.getElementById("startBtn").onclick = () => {
            if (!state.currentRoom) return;
            socket.emit("startGame", { code: state.currentRoom });
        };

        document.getElementById("toggleCardBtn").onclick = () => {
            state.cardHidden = !state.cardHidden;
            renderView();
        };

        let reconnecting = false;

        function showDisconnectModal() {
            if (reconnecting) return;
            reconnecting = true;
            showModal({
                title: "Conexión perdida",
                body: "Se ha perdido la conexión con el servidor. Intentaremos reconectar automáticamente; si no, pulsa Recargar para volver a la pantalla de inicio.",
                buttonText: "Recargar",
                onClose: () => {
                    window.location.reload();
                }
            });
        }

        socket.on("connect", () => {
            const wasReconnect = reconnecting;
            reconnecting = false;
            state.myId = socket.id;
            if (wasReconnect) {
                closeModal();
                resetToLogin();
                showModal({
                    title: "Reconectado",
                    body: "Volviste a conectarte al servidor. Vuelve a unirte a una sala para jugar.",
                    buttonText: "OK"
                });
            }
        });

        socket.on("disconnect", () => {
            showDisconnectModal();
        });

        socket.on("roomCreated", ({ code }) => {
            state.currentRoom = code;
        });

        socket.on("roomList", (rooms) => {
            state.roomList = Array.isArray(rooms) ? rooms : [];
            if (!state.currentRoom) renderRoomList();
        });

        socket.on("roomUpdate", (room) => {
            state.room = room;
            const me = room.players[state.myId];
            if (room.phase === "lobby") {
                state.card = null;
                state.cardHidden = false;
                state._lastVoteFor = null;
            } else if (me && me.expelled) {
                state._lastVoteFor = null;
            }
            renderView();
        });

        socket.on("card", (card) => {
            state.card = card;
            state.cardHidden = false;
            state._lastVoteFor = null;
            renderView();
        });

        socket.on("votingResult", (data) => {
            if (data.tie) {
                showModal({
                    title: "Empate",
                    body: "Nadie fue expulsado. Vuelvan a votar."
                });
            } else {
                const verdict = data.wasImpostor ? "SÍ, era el Impostor 😈" : "NO, era inocente 😇";
                showModal({
                    title: "Resultado de la ronda",
                    body: `Expulsado: ${data.expelled}\n${verdict}`
                });
            }
        });

        socket.on("gameEnded", (data) => {
            const winnerLabel = data.winner === "crew" ? "los Tripulantes" : "los Impostores";
            showModal({
                title: "🎉 Juego terminado",
                body: `Ganaron ${winnerLabel}.`,
                buttonText: "Continuar"
            });
        });

        socket.on("youWereExpelled", (data) => {
            const verdict = data.wasImpostor ? "Eras el Impostor 😈" : "No eras el Impostor 😇";
            showModal({
                title: "Has sido expulsado",
                body: `${verdict}\n\nEspera la siguiente ronda como espectador.`,
                buttonText: "Entendido"
            });
        });

        socket.on("errorMessage", ({ message } = {}) => {
            if (message) showModal({ title: "Error", body: message });
        });

        renderView();
    </script>
</body>
</html>
